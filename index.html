<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swipe Grid</title>

<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b0b10;
  color:white;
}

header {
  padding:12px;
  display:flex;
  justify-content:space-between;
  font-size:14px;
}

#grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(110px,1fr));
  gap:10px;
  padding:10px;
}

.card {
  background:#1a1a24;
  border-radius:14px;
  padding:10px;
  cursor:pointer;
  transition:.2s;
  border:1px solid rgba(255,255,255,.1);
}

.card:hover {
  transform:scale(1.05);
}

.tag {
  font-size:11px;
  margin-top:6px;
  opacity:.7;
}

.good { border-left:4px solid #49e68b; }
.bad { border-left:4px solid #ff4d6d; }
.meh { border-left:4px solid #ffd166; }

button {
  margin:10px;
  padding:10px 16px;
  border-radius:999px;
  border:none;
  background:#4cafef;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div>Score: <span id="score">0</span></div>
  <div>Ghosted: <span id="ghost">0</span></div>
  <div>Time: <span id="time">60</span></div>
</header>

<button onclick="startGame()">Start</button>

<div id="grid"></div>

<script>
const grid = document.getElementById("grid");

let score=0, ghost=0, time=60, running=false;

const pool = [
  {type:"good", text:"Interesting bio, responsive"},
  {type:"good", text:"Clear pics, direct"},
  {type:"meh", text:"One photo, vague"},
  {type:"meh", text:"Online but slow replies"},
  {type:"bad", text:"No pic, asks 'host?' immediately"},
  {type:"bad", text:"Ghosts after 2 messages"},
];

function startGame(){
  score=0;
  ghost=0;
  time=60;
  running=true;
  grid.innerHTML="";
  spawnLoop();
  timerLoop();
}

function spawnLoop(){
  if(!running) return;

  let p = pool[Math.floor(Math.random()*pool.length)];

  let card = document.createElement("div");
  card.className = "card " + p.type;
  card.innerHTML = `
    <b>${p.type.toUpperCase()}</b>
    <div class="tag">${p.text}</div>
  `;

  card.onclick = ()=>{
    if(!running) return;

    if(p.type==="good"){
      score+=200;
    } else if(p.type==="meh"){
      score+=50;
    } else {
      ghost++;
    }

    card.remove();
    updateUI();
  };

  grid.prepend(card);

  if(grid.children.length > 20){
    ghost++;
    grid.lastChild.remove();
  }

  setTimeout(spawnLoop, 900);
}

function timerLoop(){
  let t = setInterval(()=>{
    if(!running) return clearInterval(t);
    time--;
    updateUI();

    if(time<=0){
      running=false;
      alert("Game Over. Score: "+score+" | Ghosted: "+ghost);
    }
  },1000);
}

function updateUI(){
  document.getElementById("score").textContent = score;
  document.getElementById("ghost").textContent = ghost;
  document.getElementById("time").textContent = time;
}
</script>

</body>
</html>
