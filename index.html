<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ping Radar</title>

<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
  background:#0a0a0f;
  color:white;
  overflow:hidden;
}

#hud {
  position:absolute;
  top:10px;
  left:10px;
  z-index:10;
  font-size:14px;
}

#hud div {
  margin-bottom:6px;
}

canvas {
  display:block;
}

button {
  position:absolute;
  bottom:20px;
  left:20px;
  padding:10px 16px;
  border-radius:999px;
  border:none;
  background:#4cafef;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="hud">
  <div>Score: <span id="score">0</span></div>
  <div>Missed: <span id="miss">0</span></div>
  <div>Time: <span id="time">60</span></div>
</div>

<button onclick="startGame()">Start</button>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let W,H;
function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.onresize = resize;

let player = {x:0,y:0};
let pings = [];
let score=0, miss=0, time=60;
let running=false;

function startGame(){
  score=0;
  miss=0;
  time=60;
  pings=[];
  running=true;
  spawnLoop();
  timerLoop();
}

canvas.addEventListener("mousemove", e=>{
  player.x = e.clientX;
  player.y = e.clientY;
});

canvas.addEventListener("click", ()=>{
  if(!running) return;

  pings.forEach(p=>{
    let d = Math.hypot(player.x-p.x, player.y-p.y);
    if(d < p.r){
      score += p.value;
      p.hit = true;
    }
  });
});

function spawnLoop(){
  if(!running) return;

  pings.push({
    x:Math.random()*W,
    y:Math.random()*H,
    r:30 + Math.random()*20,
    life:100,
    value: Math.random() > .5 ? 150 : 50,
    hit:false
  });

  setTimeout(spawnLoop, 1200);
}

function timerLoop(){
  let t = setInterval(()=>{
    if(!running) return clearInterval(t);
    time--;
    if(time<=0){
      running=false;
      alert("Game Over. Score: "+score);
    }
  },1000);
}

function update(){
  if(!running) return;

  pings.forEach(p=>{
    p.life--;
    if(p.life<=0 && !p.hit){
      miss++;
      p.dead=true;
    }
  });

  pings = pings.filter(p=>!p.dead && !p.hit);
}

function draw(){
  ctx.clearRect(0,0,W,H);

  // grid
  ctx.strokeStyle="rgba(255,255,255,0.05)";
  for(let i=0;i<W;i+=60){
    ctx.beginPath();
    ctx.moveTo(i,0);
    ctx.lineTo(i,H);
    ctx.stroke();
  }
  for(let j=0;j<H;j+=60){
    ctx.beginPath();
    ctx.moveTo(0,j);
    ctx.lineTo(W,j);
    ctx.stroke();
  }

  // player
  ctx.beginPath();
  ctx.arc(player.x, player.y, 10, 0, Math.PI*2);
  ctx.fillStyle="#4cafef";
  ctx.fill();

  // pings
  pings.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.strokeStyle = p.value>100 ? "#ff4d6d" : "#49e68b";
    ctx.lineWidth=2;
    ctx.stroke();
  });

  document.getElementById("score").textContent = score;
  document.getElementById("miss").textContent = miss;
  document.getElementById("time").textContent = time;
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
